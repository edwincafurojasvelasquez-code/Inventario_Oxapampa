{% extends 'layout.html' %}

{% block title %}Editar producto{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="col-md-6 mx-auto">

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <h3 class="fw-bold mb-4">Editar producto</h3>

                <form method="POST" action="{{ url_for('editar_producto', id_producto=producto[0]) }}">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" value="{{ producto[1] }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <input type="text" name="categoria" class="form-control" value="{{ producto[2] }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto[3] }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Stock</label>
                        <input type="number" name="stock" class="form-control" value="{{ producto[4] }}" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Guardar cambios</button>
                    <a href="{{ url_for('productos') }}" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>

                </form>

            </div>
        </div>

    </div>

</div>

{% endblock %}
