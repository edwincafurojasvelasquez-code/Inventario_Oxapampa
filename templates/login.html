{% extends 'layout.html' %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}

<div class="container">
    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-md-5">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Inventario Oxapampa</h2>
                        <p class="text-muted">Iniciar sesión</p>
                    </div>

                    <form method="POST" action="{{ url_for('login') }}">

                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" name="usuario" class="form-control" placeholder="Ingrese su usuario" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="contrasena" class="form-control" placeholder="Ingrese su contraseña" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Iniciar sesión
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
